name: Release npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.0.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish agent-devkit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          case "$VERSION" in
            v*) ;;
            *) VERSION="v$VERSION" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python3 -m pip install PyYAML

      - name: Install npm metadata
        run: npm ci

      - name: Verify release alignment
        run: npm run release:verify -- "${{ steps.version.outputs.version }}"

      - name: Run release gate
        run: python3 scripts/release-gate.py --quick --json

      - name: Build package runtime
        run: npm run package:build

      - name: Verify package runtime
        run: npm run package:verify

      - name: Check npm version availability
        id: npm
        working-directory: tooling/agent-devkit
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "agent-devkit@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.exists == 'false'
        working-directory: tooling/agent-devkit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Pack release artifact
        run: npm pack ./tooling/agent-devkit

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --notes-file RELEASE_NOTES.md --latest
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file RELEASE_NOTES.md --latest
          fi
