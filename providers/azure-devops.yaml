id: azure-devops
name: Azure DevOps
kind: remote-api
status: active
description: Acesso a work items, comentarios, anexos e workflow de cards no Azure DevOps.
auth_methods:
  - id: personal-access-token
    label: Personal access token
    secret_fields:
      - AZURE_DEVOPS_PAT
config_fields:
  - name: AZURE_DEVOPS_ORG
    required: true
    secret: false
  - name: AZURE_DEVOPS_PROJECT
    required: false
    secret: false
  - name: AZURE_DEVOPS_API_VERSION
    default: "7.1"
    required: false
    secret: false
detection:
  env_any:
    - AZURE_DEVOPS_ORG
    - AZURE_DEVOPS_PAT
wizard:
  suggested_config:
    project: prompt.project
    AZURE_DEVOPS_PROJECT: prompt.project
  field_suggestions:
    AZURE_DEVOPS_PROJECT: prompt.project
  questions:
    AZURE_DEVOPS_ORG: Qual e a organizacao do Azure DevOps?
    AZURE_DEVOPS_PROJECT: Qual e o nome do projeto no Azure DevOps?
capabilities:
  read:
    - azure-devops-orchestrator/list-cards
    - azure-devops-orchestrator/read-card
  write:
    - azure-devops-orchestrator/comment-card
    - azure-devops-orchestrator/update-card-tags
    - azure-devops-orchestrator/assign-card
    - azure-devops-orchestrator/move-card
    - azure-devops-orchestrator/attach-file
health_check:
  command: agent provider doctor azure-devops
risk:
  default: read
  writes: true
fallbacks:
  - use_user_supplied_context
  - manual_steps
