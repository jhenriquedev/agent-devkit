id: local-notification
name: Local Notification
kind: local-runtime
status: active
description: Local notifications for task completion and operational alerts.
auth_methods: []
config_fields: []
health_check:
  command: agent provider doctor local-notification
risk:
  default: local-notification
  writes: true
fallbacks:
  - skip_provider
capabilities:
  read: []
  write:
    - notification.desktop
    - notification.terminal
    - notification.stdout
    - notification.audit
write: true
