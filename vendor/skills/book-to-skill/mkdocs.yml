site_name: book-to-skill
site_description: Convert books and documents into structured, on-demand agent skills.
site_url: https://booktoskill.is-a.dev/
repo_url: https://github.com/virgiliojr94/book-to-skill
repo_name: virgiliojr94/book-to-skill
edit_uri: ""

# index.md is a committed landing page. Guide (README.md) and Skill Reference
# (SKILL.md) are assembled from the repo root at build time, so prose docs stay
# single-source. See .github/workflows/deploy-docs.yml.

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Guide: guide.md
  - Architecture: ARCHITECTURE.md
  - Performance: PERFORMANCE.md
  - Skill Reference: skill-reference.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
