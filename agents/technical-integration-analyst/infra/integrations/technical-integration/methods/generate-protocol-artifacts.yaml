id: generate-protocol-artifacts
description: Generate operational artifacts for non-HTTP protocols.
inputs:
  required: [contract]
  optional: []
outputs:
  fields: [markdown]
  description: >
    Returns a Markdown string with per-protocol sections (setup, transfer/send,
    validation, cleanup). Protocols rest/soap/mcp are excluded (use generate-http-artifacts).
read_only: true
