id: generate-test-data
description: Generate valid, invalid, boundary, and flow-dependent test data.
inputs:
  required: [contract]
  optional: []
outputs:
  fields: [cases]
  description: >
    Returns {cases: [{operation, valid, invalid, boundary}]}.
    Each case covers one detected operation; flow-dependent placeholders
    (e.g. {{resource_id}}) appear in valid/boundary cases when flow is present.
read_only: true
