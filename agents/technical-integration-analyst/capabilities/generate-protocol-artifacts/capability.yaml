id: technical-integration-analyst.generate-protocol-artifacts
kind: capability
name: Generate Protocol Artifacts
version: 0.1.0
status: draft
purpose: >
  Generate test and operation artifacts for non-HTTP protocols such as SFTP,
  SMTP, file exchange, queues, and other technical integrations.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/generate-protocol-artifacts.md
  output_template: ../../templates/generate-protocol-artifacts-output.md
inputs:
  required: []
  optional: [url, file, directory, text, base_url, output]
outputs:
  artifacts: [protocol-artifacts.md]
integration:
  repository: ../../infra/integrations/technical-integration/technical_integration_repository.py
  methods:
    - ../../infra/integrations/technical-integration/methods/generate-protocol-artifacts.yaml
write_policy: read_only
