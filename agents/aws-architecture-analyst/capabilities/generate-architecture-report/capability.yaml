id: aws-architecture-analyst.generate-architecture-report
kind: capability
name: Generate Architecture Report
version: 0.1.0
status: draft
purpose: >
  Consolidar inventario, dependencias e revisoes em relatorio arquitetural.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/generate-architecture-report.md
  output_template: ../../templates/architecture-report-output.md
inputs:
  required: [inventory]
  optional: [dependency_map, output_dir, yes_create_dir, yes_overwrite]
outputs:
  artifacts: [architecture-report.md, executive-summary.md, recommended-actions.md, open-questions.md]
integration:
  repository: ../../infra/integrations/aws/aws_repository.py
  methods:
    - ../../infra/integrations/aws/methods/generate-architecture-report.yaml
write_policy: read_only
