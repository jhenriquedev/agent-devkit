id: aws-operations-operator.scale-autoscaling-group
kind: capability
name: Scale Auto Scaling Group
version: 0.1.0
status: draft
purpose: Ajustar desired capacity de Auto Scaling Group com dry-run por padrao.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/scale-autoscaling-group.md
  output_template: ../../templates/operation-plan-output.md
inputs:
  required: [auto_scaling_group, desired_capacity, environment]
  optional: [profile, region, execute, confirm_resource, output_dir, yes_create_dir, yes_overwrite]
outputs:
  artifacts: [operation-plan.md, operation-dry-run.json, operation-result.json, rollback-notes.md]
integration:
  repository: ../../infra/integrations/aws-operations/aws_operations_repository.py
  methods:
    - ../../infra/integrations/aws-operations/methods/scale-autoscaling-group.yaml
write_policy: confirm
