id: postgres-data-analyzer.build-analysis-query
kind: capability
name: Build Analysis Query
version: 0.1.0
status: draft
purpose: >
  Build a safe bounded analysis query from table and columns.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/build-analysis-query.md
  output_template: ../../templates/build-analysis-query-output.md
inputs:
  required: []
  optional: [database, schema, table, left_schema, left_table, right_schema, right_table, column, columns, query, pattern, key_column, key_value, limit, fixture, output]
outputs:
  artifacts: [build-analysis-query-output.md]
integration:
  repository: ../../infra/integrations/postgres/postgres_repository.py
  methods:
    - ../../infra/integrations/postgres/methods/build-analysis-query.yaml
write_policy: read_only
