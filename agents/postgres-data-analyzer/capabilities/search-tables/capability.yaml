id: postgres-data-analyzer.search-tables
kind: capability
name: Search Tables
version: 0.1.0
status: draft
purpose: >
  Search tables and views by name or schema pattern.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/search-tables.md
  output_template: ../../templates/search-tables-output.md
inputs:
  required: []
  optional: [database, schema, table, left_schema, left_table, right_schema, right_table, column, columns, query, pattern, key_column, key_value, limit, fixture, output]
outputs:
  artifacts: [search-tables-output.md]
integration:
  repository: ../../infra/integrations/postgres/postgres_repository.py
  methods:
    - ../../infra/integrations/postgres/methods/search-tables.yaml
write_policy: read_only
