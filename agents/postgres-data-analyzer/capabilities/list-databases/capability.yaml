id: postgres-data-analyzer.list-databases
kind: capability
name: List Databases
version: 0.1.0
status: draft
purpose: >
  List accessible PostgreSQL databases on the same server.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/list-databases.md
  output_template: ../../templates/list-databases-output.md
inputs:
  required: []
  optional: [database, schema, table, left_schema, left_table, right_schema, right_table, column, columns, query, pattern, key_column, key_value, limit, fixture, output]
outputs:
  artifacts: [list-databases-output.md]
integration:
  repository: ../../infra/integrations/postgres/postgres_repository.py
  methods:
    - ../../infra/integrations/postgres/methods/list-databases.yaml
write_policy: read_only
