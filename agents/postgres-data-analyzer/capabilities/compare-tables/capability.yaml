id: postgres-data-analyzer.compare-tables
kind: capability
name: Compare Tables
version: 0.1.0
status: draft
purpose: >
  Compare structure between two PostgreSQL tables.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/compare-tables.md
  output_template: ../../templates/compare-tables-output.md
inputs:
  required: []
