id: postgres-data-analyzer.estimate-table-size
kind: capability
name: Estimate Table Size
version: 0.1.0
status: draft
purpose: >
  Estimate row count and storage usage for tables.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/estimate-table-size.md
  output_template: ../../templates/estimate-table-size-output.md
inputs:
  required: []
  optional: [database, schema, table, left_schema, left_table, right_schema, right_table, column, columns, query, pattern, key_column, key_value, limit, fixture, output]
outputs:
  artifacts: [estimate-table-size-output.md]
integration:
  repository: ../../infra/integrations/postgres/postgres_repository.py
  methods:
    - ../../infra/integrations/postgres/methods/estimate-table-size.yaml
write_policy: read_only
