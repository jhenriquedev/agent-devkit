id: postgres-data-analyzer.sample-table
kind: capability
name: Sample Table
version: 0.1.0
status: draft
purpose: >
  Return a bounded masked sample from a table.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/sample-table.md
  output_template: ../../templates/sample-table-output.md
inputs:
  required: []
  optional: [database, schema, table, left_schema, left_table, right_schema, right_table, column, columns, query, pattern, key_column, key_value, limit, fixture, output]
outputs:
  artifacts: [sample-table-output.md]
integration:
  repository: ../../infra/integrations/postgres/postgres_repository.py
  methods:
    - ../../infra/integrations/postgres/methods/sample-table.yaml
write_policy: read_only
