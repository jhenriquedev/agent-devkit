id: analyze-cpf-column
description: Analyze CPF format, check digits, blank values, and duplicates.
inputs:
  required: [schema, table, column]
  optional: [database]
outputs:
  fields:
    - total_rows
    - blank_count
    - invalid_format_count
    - repeated_digits_count
    - valid_count
    - invalid_check_digit_count
    - duplicated_document_count
    - duplicated_row_count
read_only: true
