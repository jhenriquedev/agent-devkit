id: figma-ui-ux-product-designer.setup-figma-mcp-bridge
kind: capability
name: Setup Figma MCP Bridge
version: 0.1.0
status: draft
purpose: Configurar e validar o bridge local que permite ao agente executar Figma MCP via Codex.
entrypoint:
  runner: runner.py
  workflow: workflow.md
inputs:
  optional:
    - output_dir
    - install_bridge
    - write_env
    - env_file
    - default_plan_key
    - default_project_id
    - codex_command
    - login
    - validate_live
outputs:
  artifacts:
    - figma-mcp-setup-report.md
    - figma-env.generated
write_policy: confirm
