id: figma-ui-ux-product-designer.update-existing-figma-design
kind: capability
name: Update Existing Figma Design
version: 0.1.0
status: draft
purpose: Atualizar design Figma existente por nova versao/frame, evitando sobrescrever artefatos validados.
entrypoint:
  runner: runner.py
  workflow: workflow.md
inputs:
  required: [figma_file_url]
  optional: [brief, feedback, require_direct, output_dir]
outputs:
  artifacts: [figma-action-plan.md, feedback-triage.md, design-quality-report.md]
integration:
  provider: figma
  tool: use_figma
write_policy: confirm
