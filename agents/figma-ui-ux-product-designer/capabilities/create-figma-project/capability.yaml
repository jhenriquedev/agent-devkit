id: figma-ui-ux-product-designer.create-figma-project
kind: capability
name: Create Figma Project
version: 0.1.0
status: draft
purpose: Criar plano ou arquivo Figma novo para um projeto de design, perguntando antes de escrita real.
entrypoint:
  runner: runner.py
  workflow: workflow.md
inputs:
  optional: [brief, figma_project_url, require_direct, output_dir]
outputs:
  artifacts: [figma-action-plan.md, design-brief.md]
integration:
  provider: figma
  tool: create_new_file
write_policy: confirm
