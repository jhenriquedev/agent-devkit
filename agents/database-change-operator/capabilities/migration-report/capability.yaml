id: database-change-operator.migration-report
kind: capability
name: Migration Report
version: 0.1.0
status: draft
purpose: >
  List migration history recorded by the agent.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/migration-report.md
  output_template: ../../templates/migration-report-output.md
inputs:
  optional: [database, fixture, output]
outputs:
  artifacts: [migration-report.md]
integration:
  repository: ../../infra/integrations/postgres/database_change_repository.py
  methods:
    - ../../infra/integrations/postgres/methods/migration-report.yaml
write_policy: read_only
