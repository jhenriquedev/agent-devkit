id: data-scientist-analyst.generate-data-report
kind: capability
name: Generate Data Report
version: 0.1.0
status: draft
purpose: >
  Gerar relatorio markdown com fonte, hash, qualidade, dados sensiveis e perfil
  de colunas de um dataset.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/generate-data-report.md
  output_template: ../../templates/data-report.md
inputs:
  required: [source]
  optional: [output]
outputs:
  artifacts: [markdown, json]
integration:
  repository: ../../infra/integrations/file-dataset/data_repository.py
  methods:
    - ../../infra/integrations/file-dataset/methods/generate-data-report.yaml
write_policy: output_only
