id: data-scientist-analyst.compare-periods
kind: capability
name: Compare Periods
version: 0.1.0
status: draft
purpose: >
  Comparar uma metrica entre dois intervalos de datas e retornar delta absoluto,
  percentual e direcao.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/compare-periods.md
  output_template: null
inputs:
  required: [source, date_column, metric_column, baseline_start, baseline_end, comparison_start, comparison_end]
  optional: [output]
outputs:
  artifacts: [json]
integration:
  repository: ../../infra/integrations/file-dataset/data_repository.py
  methods:
    - ../../infra/integrations/file-dataset/methods/compare-periods.yaml
write_policy: read_only
