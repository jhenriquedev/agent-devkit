id: azure-devops-orchestrator.mover-card
kind: capability
name: Mover Card
version: 0.1.0
status: draft

purpose: >
  Mover um work item para outro estado e, opcionalmente, coluna, com preview e
  confirmacao antes da escrita.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/mover-card.md
  output_template: ../../templates/mover-card-output.md

inputs:
  required:
    - work_item_id
    - project
    - state
  optional:
    - board_column
    - reason
    - execute

outputs:
  artifacts:
    - movimentacao-card.md

integration:
  repository: ../../infra/integrations/azure/azure_repository.py
  methods:
    - ../../infra/integrations/azure/methods/get-work-item.yaml
    - ../../infra/integrations/azure/methods/update-work-item.yaml

write_policy: confirm
