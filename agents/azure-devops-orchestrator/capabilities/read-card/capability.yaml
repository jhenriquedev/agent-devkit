id: azure-devops-orchestrator.read-card
kind: capability
name: Read Card
version: 0.1.0
status: draft

purpose: >
  Read a work item by ID and summarize context, acceptance criteria, comments,
  risks, and next steps.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/read-card.md
  output_template: ../../templates/read-card-output.md

inputs:
  required:
    - work_item_id
    - project
  optional:
    - include_comments
    - include_relations

outputs:
  artifacts:
    - card-analysis.md

integration:
  repository: ../../infra/integrations/azure/azure_repository.py
  methods:
    - ../../infra/integrations/azure/methods/get-work-item.yaml
    - ../../infra/integrations/azure/methods/get-work-item-comments.yaml

runtime:
  provider: azure-devops
  source:
    enabled: true
    args:
      project: --project
      AZURE_DEVOPS_PROJECT: --project
      fixture: --fixture
    env:
      org: AZURE_DEVOPS_ORG
      organization: AZURE_DEVOPS_ORG
      project: AZURE_DEVOPS_PROJECT
      api_version: AZURE_DEVOPS_API_VERSION
      AZURE_DEVOPS_ORG: AZURE_DEVOPS_ORG
      AZURE_DEVOPS_PROJECT: AZURE_DEVOPS_PROJECT
      AZURE_DEVOPS_API_VERSION: AZURE_DEVOPS_API_VERSION

write_policy: read_only

routing:
  anchors:
    - card
    - tarefa
    - work item
    - workitem
  intents:
    - work-item.card.read
  examples:
    - analise o card 9900
  priority: 90
