id: azure-devops-orchestrator.ler-card
kind: capability
name: Ler Card
version: 0.1.0
status: draft

purpose: >
  Ler um work item por ID, resumir contexto, criterios, comentarios, riscos e
  proximos passos.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/ler-card.md
  output_template: ../../templates/ler-card-output.md

inputs:
  required:
    - work_item_id
    - project
  optional:
    - include_comments
    - include_relations

outputs:
  artifacts:
    - analise-card.md

integration:
  repository: ../../infra/integrations/azure/azure_repository.py
  methods:
    - ../../infra/integrations/azure/methods/get-work-item.yaml
    - ../../infra/integrations/azure/methods/get-work-item-comments.yaml

write_policy: read_only
