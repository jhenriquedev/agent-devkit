id: azure-devops-orchestrator.prepare-card-analysis
kind: capability
name: Prepare Card Analysis
version: 0.1.0
status: draft

purpose: >
  Prepare an operational work item analysis, separating facts, hypotheses, gaps,
  risks, next steps, and an optional comment draft.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/prepare-card-analysis.md
  output_template: ../../templates/prepare-card-analysis-output.md

inputs:
  required:
    - work_item_id
    - project
  optional:
    - analysis_type
    - include_comment_draft
    - fixture

outputs:
  artifacts:
    - card-operational-analysis.md

integration:
  repository: ../../infra/integrations/azure/azure_repository.py
  methods:
    - ../../infra/integrations/azure/methods/get-work-item.yaml
    - ../../infra/integrations/azure/methods/get-work-item-comments.yaml

write_policy: read_only
