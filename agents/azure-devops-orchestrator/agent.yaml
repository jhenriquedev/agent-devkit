id: azure-devops-orchestrator
kind: specialist-agent
name: Azure DevOps Orchestrator
version: 0.1.0
status: draft
owner: agent-devkit

purpose: >
  Manage Azure DevOps Boards work items, cards, comments, tags, assignments,
  and state transitions as a specialist package for consuming agents.

default_context:
  - knowledge/system.md
  - knowledge/context.md
  - knowledge/policies.yaml

env:
  required:
    - AZURE_DEVOPS_ORG
    - AZURE_DEVOPS_PAT
  optional:
    - AZURE_DEVOPS_API_VERSION
    - AZURE_DEVOPS_PROJECT

capabilities:
  - list-cards
  - read-card
  - comment-card
  - update-card-tags
  - assign-card
  - move-card
  - prepare-card-analysis
  - generate-cards-report
  - attach-file

agent_surface:
  repositories:
    - infra/integrations/azure/azure_repository.py
  methods:
    - infra/integrations/azure/methods/list-work-items.yaml
    - infra/integrations/azure/methods/get-work-item.yaml
    - infra/integrations/azure/methods/get-work-item-comments.yaml
    - infra/integrations/azure/methods/add-comment.yaml
    - infra/integrations/azure/methods/update-work-item.yaml
    - infra/integrations/azure/methods/find-users.yaml
    - infra/integrations/azure/methods/attach-file.yaml
  policies:
    - knowledge/policies.yaml

write_policy:
  read_operations: read_only
  comment_operations: confirm
  tag_operations: confirm
  assign_operations: confirm
  move_state_operations: confirm
  bulk_operations: confirm

routing:
  anchors:
    - azure
    - board
    - card
    - devops
    - item
    - work
    - workitem
  intents:
    - work-item.card
  priority: 80
