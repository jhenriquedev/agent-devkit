version: 0.1.0
status: draft
purpose: Auditar AWS Config recorders e rules como guardrails de governanca.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/audit-config-guardrails.md
  output_template: ../../templates/config-guardrails-output.md
