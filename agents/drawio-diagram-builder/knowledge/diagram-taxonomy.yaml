id: drawio-diagram-builder.diagram-taxonomy
version: 0.2.0

families:
  architecture:
    decision_hints:
      - "objetivo menciona sistemas, componentes, cloud, microserviços, APIs, filas, bancos, integrações ou boundaries"
      - "demanda por visão técnica de topologia ou runtime"
      - "palavras-chave: arquitetura, infraestrutura, deployment, C4, observabilidade, confiança"
    examples:
      - c4_context
      - c4_container
      - c4_component
      - cloud_architecture
      - integration_architecture
      - api_contract_flow
      - event_driven_flow
      - deployment_runtime
      - observability
      - security_trust_boundary
      - blast_radius
  product:
    decision_hints:
      - "objetivo menciona jornada do usuário, fluxo de processo, aprovação, checkout, onboarding ou exceção"
      - "demanda por sequência de passos de negócio ou produto"
      - "palavras-chave: jornada, fluxo, processo, etapas, raia, decisão de negócio"
    examples:
      - user_journey
      - service_blueprint
      - onboarding_flow
      - checkout_flow
      - approval_flow
      - conversion_funnel
      - exception_flow
  operations:
    decision_hints:
      - "objetivo menciona runbook, incidente, triagem, suporte, escalonamento ou árvore de decisão operacional"
      - "demanda por procedimento operacional ou fluxo de atendimento"
      - "palavras-chave: runbook, incidente, n1, n2, triagem, escalonamento, suporte"
    examples:
      - runbook
      - incident_flow
      - n1_triage
      - n2_escalation
      - support_ticket_state
      - decision_tree
  data:
    decision_hints:
      - "objetivo menciona entidades, tabelas, relacionamentos, chaves, linhagem de dados ou ETL"
      - "demanda por modelagem de dados ou rastreamento de fluxo de dados"
      - "palavras-chave: ERD, entidade, tabela, banco, schema, linhagem, ETL, domínio de dados"
    examples:
      - erd
      - data_lineage
      - etl_flow
      - reconciliation_flow
      - domain_relationships
