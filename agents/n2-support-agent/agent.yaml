id: n2-support-agent
kind: specialist-agent
name: N2 Support Agent
version: 0.1.0
status: draft
owner: jhss

purpose: >
  Execute N2 technical-operational investigation from an Azure DevOps card or
  N1 handoff, analyze project code for root cause, classify the issue, and
  generate a patch_plan.md ready for safe implementation.

default_context:
  - knowledge/system.md
  - knowledge/context.md
  - knowledge/policies.yaml
  - knowledge/runbooks/n2-root-cause-analysis.md

env:
  required: []
  optional: []

depends_on_agents:
  - n1-support-agent
  - azure-devops-orchestrator
  - bpo-analyser
  - postgres-data-analyzer
  - sqlserver-data-analyzer
  - aws-cloudwatch-log-analyzer
  - elasticsearch-log-analyzer

capabilities:
  - execute-n2-investigation
  - load-support-context
  - validate-n1-handoff
  - analyze-code-root-cause
  - rank-code-findings
  - correlate-runtime-evidence
  - select-specialist-checks
  - execute-specialist-validation
  - classify-root-cause
  - build-reproduction-strategy
  - generate-patch-plan
  - review-patch-plan-readiness
  - generate-card-comment
  - update-azure-workflow
  - update-n2-card-workflow

agent_surface:
  repositories: []
  methods: []
  orchestrated_agents:
    - n1-support-agent/execute-n1-card-runbook
    - azure-devops-orchestrator/read-card
    - azure-devops-orchestrator/comment-card
    - azure-devops-orchestrator/update-card-tags
    - azure-devops-orchestrator/move-card
    - azure-devops-orchestrator/assign-card
    - azure-devops-orchestrator/attach-file
    - bpo-analyser/analyze-proposal
    - postgres-data-analyzer/run-readonly-query
    - sqlserver-data-analyzer/run-readonly-query
    - aws-cloudwatch-log-analyzer/search-log-events
    - elasticsearch-log-analyzer/search-log-events
  policies:
    - knowledge/policies.yaml

write_policy:
  read_operations: auto
  local_patch_plan: auto
  azure_comment_operations: confirm
  azure_tag_operations: confirm
  azure_move_operations: confirm
  azure_attachment_operations: confirm
  external_mutations: confirm
