id: presentation-deck-builder.create-template-version
kind: capability
name: Create Template Version
version: 0.1.0
status: draft
purpose: Create a new template version from a base version or updated file.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/create-template-version.md
inputs:
  required: [template_id, new_version]
  optional: [base_version, template]
outputs:
  artifacts: [template.pptx, changelog.md]
integration:
  repository: null
  methods: []
write_policy: local_write
