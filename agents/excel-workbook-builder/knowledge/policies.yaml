id: excel-workbook-builder.policies
phase: 3
template_policy:
  save_requires_confirmation: true
  never_overwrite_validated_template: true
  versioning_required: true
workbook_policy:
  final_format: xlsx
  formulas_must_be_auditable: true
  typed_values_required: true
  visual_review_required: true
delegation_policy:
  database_access: delegate_to_existing_agents
  allowed_database_agents:
    - sqlserver-data-analyzer
    - postgres-data-analyzer
    - azure-devops-orchestrator
quality_gates:
  workbook_saved:
    capability: review-generated-workbook
  formula_error_scan:
    capability: scan-formula-errors
  required_sheet_check:
    capability: review-generated-workbook
  key_range_inspection:
    capability: inspect-template
  visual_preview_for_generated_workbooks:
    capability: render-workbook-preview
  source_traceability:
    capability: review-generated-workbook
