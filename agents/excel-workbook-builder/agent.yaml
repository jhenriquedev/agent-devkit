id: excel-workbook-builder
kind: agent
name: Excel Workbook Builder
version: 0.1.0
status: draft
owner: ai-devkit
phase: 3
purpose: >
  Criar, versionar, preencher, reconciliar, revisar e exportar planilhas Excel
  com base em templates, dados recebidos e fontes delegadas a outros agentes.
knowledge:
  context: knowledge/context.md
  policies: knowledge/policies.yaml
  template_catalog: knowledge/template-catalog.yaml
default_context:
  - knowledge/system.md
  - knowledge/context.md
  - knowledge/policies.yaml
  - knowledge/runtime.md
capability_context:
  formulas:
    - knowledge/formula-rules.md
  reconciliation:
    - knowledge/reconciliation-rules.md
  routing:
    - knowledge/source-routing.md
  templates:
    - knowledge/template-catalog.yaml
capabilities:
  - add-formulas-and-validations
  - compare-template-versions
  - create-adjustment-suggestions
  - create-pivot-summary
  - create-summary-dashboard
  - create-template
  - create-template-version
  - deprecate-template-version
  - explain-reconciliation-differences
  - export-workbook-artifacts
  - generate-reconciliation-report
  - generate-template-input-file
  - generate-workbook-from-data
  - generate-workbook-from-template
  - ingest-source-document
  - ingest-workbook-data
  - inspect-template
  - list-template-versions
  - list-templates
  - map-source-to-template
  - normalize-tabular-data
  - plan-workbook
  - promote-template-version
  - reconcile-datasets
  - refine-generated-workbook
  - refine-template
  - refresh-workbook-data
  - register-template
  - render-workbook-preview
  - request-database-data
  - review-generated-workbook
  - run-workbook-operation
  - scan-formula-errors
  - update-existing-workbook
  - validate-reconciliation-rules
  - validate-source-data
capabilities_dir: capabilities
templates_dir: templates
infra_dir: infra
