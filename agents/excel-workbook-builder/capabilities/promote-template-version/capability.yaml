id: excel-workbook-builder.promote-template-version
kind: capability
name: Promote Template Version
version: 0.1.0
status: draft
purpose: Promote one template version to current validated version after approval.
entrypoint:
  runner: runner.py
  workflow: workflow.md
inputs:
  required: [template_id, template_version]
outputs:
  artifacts: [template.yaml]
write_policy: confirm
