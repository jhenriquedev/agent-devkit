id: excel-workbook-builder.deprecate-template-version
kind: capability
name: Deprecate Template Version
version: 0.1.0
status: draft
purpose: Mark a template version as deprecated without deleting files.
entrypoint:
  runner: runner.py
  workflow: workflow.md
inputs:
  required: [template_id, template_version]
outputs:
  artifacts: [template.yaml]
write_policy: confirm
