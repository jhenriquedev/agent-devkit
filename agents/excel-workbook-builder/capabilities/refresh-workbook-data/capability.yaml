id: excel-workbook-builder.refresh-workbook-data
kind: capability
name: Refresh Workbook Data
version: 0.1.0
status: draft
purpose: Refresh a target data sheet while preserving the existing workbook, formulas, sheets, and layout outside that sheet.
entrypoint:
  runner: runner.py
  workflow: workflow.md
inputs:
  required: [workbook, input]
  optional: [sheet, output]
outputs:
  artifacts: [workbook.xlsx]
write_policy: output_only
