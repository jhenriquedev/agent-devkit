id: elasticsearch-log-analyzer.trace-request
kind: capability
name: Trace Request
version: 0.1.0
status: draft
purpose: >
  Trace one request across logs by trace, correlation, request, user, or custom
  identifier.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/trace-request.md
  output_template: ../../templates/trace-request-output.md
inputs:
  required: [source, request_id, from, to]
  optional: [service, environment, time_field, limit, fixture, output]
outputs:
  artifacts: [request-trace.md]
integration:
  repository: ../../infra/integrations/elasticsearch/elasticsearch_repository.py
  methods:
    - ../../infra/integrations/elasticsearch/methods/search-events.yaml
write_policy: read_only
