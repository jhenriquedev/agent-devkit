id: elasticsearch-log-analyzer.list-log-sources
kind: capability
name: List Log Sources
version: 0.1.0
status: draft
purpose: >
  List Elasticsearch indices, data streams, and aliases that can be used as log
  sources.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/list-log-sources.md
  output_template: ../../templates/list-log-sources-output.md
inputs:
  optional: [pattern, limit, fixture, output]
outputs:
  artifacts: [log-sources.md]
integration:
  repository: ../../infra/integrations/elasticsearch/elasticsearch_repository.py
  methods:
    - ../../infra/integrations/elasticsearch/methods/list-sources.yaml
write_policy: read_only
