id: elasticsearch-log-analyzer.extract-log-samples
kind: capability
name: Extract Log Samples
version: 0.1.0
status: draft
purpose: >
  Extract representative log samples for investigation, reports, or external
  tickets.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/extract-log-samples.md
  output_template: ../../templates/extract-log-samples-output.md
inputs:
  required: [source, from, to]
  optional: [query, service, environment, level, time_field, limit, fixture, output]
outputs:
  artifacts: [log-samples.md]
integration:
  repository: ../../infra/integrations/elasticsearch/elasticsearch_repository.py
  methods:
    - ../../infra/integrations/elasticsearch/methods/search-events.yaml
write_policy: read_only
