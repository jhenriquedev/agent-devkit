id: software-specification-analyst.conduct-requirements-interview
kind: capability
name: Conduct Requirements Interview
version: 0.1.0
status: draft
purpose: >
  Conduct a targeted requirements interview, adapting question depth to the
  demand size and grouping questions by business, functional, technical, data,
  security, and QA concerns.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/conduct-requirements-interview.md
  output_template: ../../templates/interview-guide-output.md
inputs:
  required: [input]
  optional: [analysis_dir, output_dir, depth, audience, yes_create_dir, yes_overwrite]
outputs:
  artifacts:
    - interview-guide.md
    - stakeholder-questions.md
    - missing-decisions.md
integration:
  repository: null
  methods: []
write_policy: ask_before_creating_output_directory
