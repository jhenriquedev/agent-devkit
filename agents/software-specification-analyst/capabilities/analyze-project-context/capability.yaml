id: software-specification-analyst.analyze-project-context
kind: capability
name: Analyze Project Context
version: 0.1.0
status: draft
purpose: >
  Analyze one local project to create intermediate requirements-analysis
  documents before producing a final software specification.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/analyze-project-context.md
  output_template: ../../templates/analysis-context-output.md
inputs:
  required: [project]
  optional: [output_dir, depth, focus, yes_create_dir, yes_overwrite]
outputs:
  artifacts:
    - analysis-context.md
    - project-architecture-notes.md
    - business-rules-discovered.md
    - critical-points.md
    - business-questions.md
    - technical-impact-analysis.md
    - integration-map.md
    - data-and-permissions-analysis.md
    - open-decisions.md
    - analysis-review.md
integration:
  repository: null
  methods: []
write_policy: ask_before_creating_output_directory
