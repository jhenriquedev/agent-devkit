id: pyautogui-automation-builder.wrap-pyautogui-as-capability
kind: capability
name: Wrap PyAutoGUI As Capability
version: 0.1.0
status: draft
purpose: Planejar ou escrever wrapper de capability para automacao PyAutoGUI aprovada.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  output_template: ../../templates/capability-wrapper.md
inputs:
  required:
    - spec
    - agent-id
    - capability-id
  optional:
    - execute
    - allow-overwrite
outputs:
  artifacts:
    - pyautogui-capability-wrapper-files.json
write_policy: local_write
