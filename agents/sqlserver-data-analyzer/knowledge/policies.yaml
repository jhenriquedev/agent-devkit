id: sqlserver-data-analyzer.policies
version: 0.1.0
status: draft

read_operations:
  confirmation_required: false
  allowed:
    - test_connection
    - list_databases
    - list_schemas
    - list_tables
    - describe_table
    - list_relationships
    - suggest_joins
    - search_tables
    - search_columns
    - explore_database_domain
    - generate_erd_report
    - run_readonly_query
    - validate_readonly_query
    - build_analysis_query
    - explain_query_plan
    - sample_table
    - profile_table
    - analyze_query_result
    - detect_sensitive_columns
    - detect_data_quality_issues
    - analyze_cpf_column
    - estimate_table_size
    - compare_tables
    - trace_record
    - generate_data_report

write_operations:
  supported: false
  blocked_keywords:
    - insert
    - update
    - delete
    - drop
    - alter
    - truncate
    - merge
    - create
    - grant
    - revoke
    - backup
    - restore
    - dbcc
    - exec

privacy:
  mask_cpf_by_default: true
  mask_cnpj_by_default: true
  mask_email_by_default: true
  avoid_personal_data_dumps: true

limits:
  default_query_limit: 100
  default_statement_timeout_ms: 15000
  default_lock_timeout_ms: 5000
