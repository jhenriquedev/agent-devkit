id: sqlserver-data-analyzer.describe-table
kind: capability
name: Describe Table
version: 0.1.0
status: draft
purpose: >
  Describe columns, keys, constraints, and indexes for a table.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/describe-table.md
  output_template: ../../templates/describe-table-output.md
inputs:
