id: docker-container-builder.generate-container-project-files
kind: capability
name: Generate Container Project Files
version: 0.1.0
status: draft
purpose: Planejar ou escrever artefatos Docker locais dentro de target_project.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  output_template: ../../templates/container-plan.md
inputs:
  required:
    - spec
  optional:
    - execute
    - allow-overwrite
outputs:
  artifacts:
    - container-project-files.json
write_policy: local_write
