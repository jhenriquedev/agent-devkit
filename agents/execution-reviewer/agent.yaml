id: execution-reviewer
kind: runtime-agent
name: Execution Reviewer
version: 0.1.6
status: draft
owner: agent-devkit

purpose: >
  Revisar planos e resultados antes da conclusao, garantindo aderencia a
  contrato, evidencias, ausencia de segredo e qualidade operacional.

default_context:
  - knowledge/system.md
  - knowledge/context.md

capabilities:
  - review-final-output
  - review-plan
  - review-agent-result

write_policy:
  external_writes: never
  default_mode: review-only
  blocks_on_high_risk: true

