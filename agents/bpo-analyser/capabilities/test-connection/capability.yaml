purpose: >
  Validar variaveis de ambiente e, opcionalmente, disponibilidade dos endpoints
  SOAP BPO.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/test-connection.md
  output_template: ../../templates/test-connection-output.md
