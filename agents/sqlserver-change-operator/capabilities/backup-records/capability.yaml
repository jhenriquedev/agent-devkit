id: sqlserver-change-operator.backup-records
kind: capability
name: Backup Records
version: 0.1.0
status: draft
purpose: >
  Create a logical backup of records selected by a where clause.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/backup-records.md
  output_template: ../../templates/backup-records-output.md
inputs:
  required: []
  optional: [database, path, rollback_path, name, schema, table, key_column, input, set_json, where, execute, confirm_delete, max_affected_rows, fixture, output]
outputs:
  artifacts: [backup-records-result.md]
integration:
  repository: ../../infra/integrations/sqlserver/sqlserver_change_repository.py
  methods:
    - ../../infra/integrations/sqlserver/methods/backup-records.yaml
write_policy: confirm
