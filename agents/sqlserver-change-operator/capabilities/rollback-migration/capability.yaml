id: sqlserver-change-operator.rollback-migration
kind: capability
name: Rollback Migration
version: 0.1.0
status: draft
purpose: >
  Execute a rollback migration with --execute confirmation.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/rollback-migration.md
  output_template: ../../templates/rollback-migration-output.md
inputs:
  required: []
  optional: [database, path, rollback_path, name, schema, table, key_column, input, set_json, where, execute, confirm_delete, max_affected_rows, fixture, output]
outputs:
  artifacts: [rollback-migration-result.md]
integration:
  repository: ../../infra/integrations/sqlserver/sqlserver_change_repository.py
  methods:
    - ../../infra/integrations/sqlserver/methods/rollback-migration.yaml
write_policy: confirm
