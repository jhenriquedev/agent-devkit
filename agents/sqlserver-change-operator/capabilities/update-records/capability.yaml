id: sqlserver-change-operator.update-records
kind: capability
name: Update Records
version: 0.1.0
status: draft
purpose: >
  Update records using explicit set JSON and where clause with dry-run by default.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/update-records.md
  output_template: ../../templates/update-records-output.md
inputs:
  required: []
  optional: [database, path, rollback_path, name, schema, table, key_column, input, set_json, where, execute, confirm_delete, max_affected_rows, fixture, output]
outputs:
  artifacts: [update-records-result.md]
integration:
  repository: ../../infra/integrations/sqlserver/sqlserver_change_repository.py
  methods:
    - ../../infra/integrations/sqlserver/methods/update-records.yaml
write_policy: confirm
