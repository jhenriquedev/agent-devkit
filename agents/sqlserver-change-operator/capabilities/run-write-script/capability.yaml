id: sqlserver-change-operator.run-write-script
kind: capability
name: Run Write Script
version: 0.1.0
status: draft
purpose: >
  Execute a controlled T-SQL write script with dry-run by default.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/run-write-script.md
  output_template: ../../templates/run-write-script-output.md
inputs:
  required: []
  optional: [database, path, rollback_path, name, schema, table, key_column, input, set_json, where, execute, confirm_delete, max_affected_rows, fixture, output]
outputs:
  artifacts: [run-write-script-result.md]
integration:
  repository: ../../infra/integrations/sqlserver/sqlserver_change_repository.py
  methods:
    - ../../infra/integrations/sqlserver/methods/run-write-script.yaml
write_policy: confirm
