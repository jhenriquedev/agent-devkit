id: sqlserver-change-operator.upsert-records
kind: capability
name: Upsert Records
version: 0.1.0
status: draft
purpose: >
  Upsert JSON or CSV records into a table with dry-run by default.
entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/upsert-records.md
  output_template: ../../templates/upsert-records-output.md
inputs:
  required: []
  optional: [database, path, rollback_path, name, schema, table, key_column, input, set_json, where, execute, confirm_delete, max_affected_rows, fixture, output]
outputs:
  artifacts: [upsert-records-result.md]
integration:
  repository: ../../infra/integrations/sqlserver/sqlserver_change_repository.py
  methods:
    - ../../infra/integrations/sqlserver/methods/upsert-records.yaml
write_policy: confirm
