id: github-pr-reviewer
kind: specialist-agent
name: GitHub PR Reviewer
version: 0.1.0
status: draft
owner: agent-devkit

purpose: >
  Listar PRs pendentes de revisao, inspecionar diffs, gerar relatorios
  report-only e criar automacoes locais de revisao diaria com permissoes
  conservadoras.

default_context:
  - knowledge/system.md
  - knowledge/context.md

env:
  required: []
  optional:
    - GITHUB_TOKEN

capabilities:
  - list-review-requests
  - inspect-pr
  - review-pr-diff
  - create-review-automation

write_policy:
  read_operations: read_only
  comments: confirm
  approvals: confirm
  request_changes: confirm
  default_mode: read_only

routing:
  anchors:
    - gh
    - github
    - pr
    - prs
    - pull
    - request
  intents:
    - github.pr-review
  priority: 50
