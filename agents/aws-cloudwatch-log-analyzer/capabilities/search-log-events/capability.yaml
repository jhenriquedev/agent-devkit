id: aws-cloudwatch-log-analyzer.search-log-events
kind: capability
name: Search Log Events
version: 0.1.0
status: draft

purpose: >
  Buscar eventos em um log group por janela de tempo, filtro e limite.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/search-log-events.md
  output_template: ../../templates/search-log-events-output.md

inputs:
  required:
    - region
    - log_group
    - start_time
    - end_time
  optional:
    - filter_pattern
    - log_stream_prefix
    - limit
    - fixture
    - output

outputs:
  artifacts:
    - log-events.md

integration:
  repository: ../../infra/integrations/aws-cloudwatch/cloudwatch_repository.py
  methods:
    - ../../infra/integrations/aws-cloudwatch/methods/filter-log-events.yaml

write_policy: read_only
