id: aws-cloudwatch-log-analyzer.analyze-service-error
kind: capability
name: Analyze Service Error
version: 0.1.0
status: draft

purpose: >
  Analisar eventos de erro de um servico em uma janela de tempo e gerar
  diagnostico operacional.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/analyze-service-error.md
  output_template: ../../templates/analyze-service-error-output.md

inputs:
  required:
    - region
    - service
    - environment
    - log_group
    - start_time
    - end_time
  optional:
    - error_filter
    - endpoint
    - status_code
    - limit
    - fixture
    - output

outputs:
  artifacts:
    - service-error-analysis.md

integration:
  repository: ../../infra/integrations/aws-cloudwatch/cloudwatch_repository.py
  methods:
    - ../../infra/integrations/aws-cloudwatch/methods/filter-log-events.yaml

runtime:
  provider: aws

write_policy: read_only

routing:
  anchors:
    - cloudwatch
    - erro
    - error
    - service
    - servico
  intents:
    - logs.error-analysis
  examples:
    - analise logs do cloudwatch para erro no servico
  priority: 80
