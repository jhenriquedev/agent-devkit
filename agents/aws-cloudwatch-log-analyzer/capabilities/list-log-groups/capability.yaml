id: aws-cloudwatch-log-analyzer.list-log-groups
kind: capability
name: List Log Groups
version: 0.1.0
status: draft

purpose: >
  Listar log groups do CloudWatch por regiao e prefixo para descoberta de fontes
  de log.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/list-log-groups.md
  output_template: ../../templates/list-log-groups-output.md

inputs:
  required:
    - region
  optional:
    - log_group_prefix
    - service
    - environment
    - limit
    - fixture
    - output

outputs:
  artifacts:
    - log-groups.md

integration:
  repository: ../../infra/integrations/aws-cloudwatch/cloudwatch_repository.py
  methods:
    - ../../infra/integrations/aws-cloudwatch/methods/list-log-groups.yaml

write_policy: read_only
