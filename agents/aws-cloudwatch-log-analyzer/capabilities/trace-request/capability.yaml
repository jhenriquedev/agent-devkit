id: aws-cloudwatch-log-analyzer.trace-request
kind: capability
name: Trace Request
version: 0.1.0
status: draft

purpose: >
  Rastrear eventos relacionados a um request por correlation id, request id ou
  outro identificador tecnico.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/trace-request.md
  output_template: ../../templates/trace-request-output.md

inputs:
  required:
    - region
    - log_group
    - start_time
    - end_time
    - identifier
  optional:
    - identifier_type
    - limit
    - fixture
    - output

outputs:
  artifacts:
    - request-trace.md

integration:
  repository: ../../infra/integrations/aws-cloudwatch/cloudwatch_repository.py
  methods:
    - ../../infra/integrations/aws-cloudwatch/methods/filter-log-events.yaml

write_policy: read_only
