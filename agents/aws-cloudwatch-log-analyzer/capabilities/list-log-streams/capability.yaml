id: aws-cloudwatch-log-analyzer.list-log-streams
kind: capability
name: List Log Streams
version: 0.1.0
status: draft

purpose: >
  Listar streams de um log group CloudWatch em uma regiao, com prefixo e limite
  opcionais, para descoberta controlada antes de consultas de eventos.

entrypoint:
  runner: runner.py
  workflow: workflow.md
  prompt: ../../knowledge/prompts/list-log-streams.md
  output_template: ../../templates/list-log-streams-output.md

inputs:
  required:
    - region
    - log_group
  optional:
    - log_stream_prefix
    - limit
    - fixture
    - output

outputs:
  artifacts:
    - log-streams.md

integration:
  repository: ../../infra/integrations/aws-cloudwatch/cloudwatch_repository.py
  methods:
    - ../../infra/integrations/aws-cloudwatch/methods/describe-log-streams.yaml

write_policy: read_only
