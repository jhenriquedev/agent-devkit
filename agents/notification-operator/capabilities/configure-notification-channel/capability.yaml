id: notification-operator.configure-notification-channel
kind: capability
name: Configure Notification Channel
version: 0.1.0
status: draft
purpose: Configurar canais locais de notificacao do Agent DevKit.
entrypoint:
  runner: runner.py
  workflow: workflow.md
inputs:
  required:
    - channel
  optional:
    - enabled
    - event_filter
outputs:
  artifacts:
    - notification-channel-config.json
write_policy: local_config_write
