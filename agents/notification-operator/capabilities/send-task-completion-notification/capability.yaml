id: notification-operator.send-task-completion-notification
kind: capability
name: Send Task Completion Notification
version: 0.1.0
status: draft
purpose: Enviar notificacao local de tarefa usando o contrato canonico.
entrypoint:
  runner: runner.py
  workflow: workflow.md
inputs:
  required:
    - summary
    - confirm
  optional:
    - event
    - status
    - task_id
    - title
    - channel
    - artifact
    - next_step
    - severity
    - sensitive
outputs:
  artifacts:
    - notification-delivery.json
write_policy: confirm
